# aa-ma-team-guide-tests.yaml — Executable test definitions for documentation task
# Tests verify file existence, content completeness, and structural requirements.

milestone_1:
  - name: "Quick Start section exists in team guide"
    command: "grep -c '## Part 0' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Principles section exists in team guide"
    command: "grep -c '## Part 1' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "5-file table present in Quick Start"
    command: "grep -c 'reference.md' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "No tool-specific terminology in Parts 0-1"
    command: "sed -n '/## Part 0/,/## Part 2/p' docs/aa-ma-team-guide.md | grep -ciE 'slash command|CLAUDE\\.md|cursor-bank' || echo 0"
    expected: "0"
  - name: "Beginner readability — no jargon before Part 2"
    command: "sed -n '/## Part 0/,/## Part 2/p' docs/aa-ma-team-guide.md | wc -w | awk '{print ($1 > 100) ? \"sufficient\" : \"too_short\"}'"
    expected: "sufficient"

milestone_2:
  - name: "Claude Code section exists"
    command: "grep -c '## Part 2' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "All 4 slash commands documented"
    command: "grep -cE '/aa-ma-plan|/execute-aa-ma-step|/execute-aa-ma-milestone|/execute-aa-ma-full' docs/aa-ma-team-guide.md"
    expected_pattern: "^[4-9]"
  - name: "Context injection XML example present"
    command: "grep -c '<REFERENCE>' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Code blocks are present for copy-paste"
    command: "grep -c '^\\.\\{0,2\\}\\`\\`\\`' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Tips section addresses context loss"
    command: "grep -ciE 'context.*(loss|drift|limit|compaction)' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"

milestone_3:
  - name: "Cursor section exists"
    command: "grep -c '## Part 3' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "AA-MA to Cursor mapping table present"
    command: "grep -c 'projectbrief.md' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "cursor-bank init setup instruction present"
    command: "grep -c 'cursor-bank init' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Privacy mode documented"
    command: "grep -ciE 'privacy.*(mode|setting|consideration)' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "All 6 memory bank files mentioned"
    command: "grep -cE 'projectbrief|techContext|systemPatterns|productContext|activeContext|progress\\.md' docs/aa-ma-team-guide.md"
    expected_pattern: "^[6-9]"

milestone_4:
  - name: "Decision framework section exists"
    command: "grep -c '## Part 4' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Decision matrix present"
    command: "grep -ciE '(decision.*matrix|when.*to.*use|complexity.*session)' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Team collaboration section exists"
    command: "grep -c '## Part 5' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Handoff protocol documented"
    command: "grep -ciE 'handoff|handover|transition' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Both tools covered in team section"
    command: "sed -n '/## Part 5/,/## /p' docs/aa-ma-team-guide.md | grep -ciE 'claude.code|cursor' || echo 0"
    expected_pattern: "^[1-9]"

milestone_5:
  - name: "Quick reference file exists"
    command: "test -f docs/aa-ma-quick-reference.md && echo 'exists' || echo 'missing'"
    expected: "exists"
  - name: "Quick reference contains workflow diagram"
    command: "grep -ciE '(workflow|diagram|flowchart|plan.*execute.*track)' docs/aa-ma-quick-reference.md"
    expected_pattern: "^[1-9]"
  - name: "Quick reference contains command cheat sheet"
    command: "grep -cE '/aa-ma-plan|/execute-aa-ma' docs/aa-ma-quick-reference.md"
    expected_pattern: "^[1-9]"
  - name: "Quick reference is concise (under 150 lines)"
    command: "wc -l < docs/aa-ma-quick-reference.md | awk '{print ($1 <= 150) ? \"concise\" : \"too_long\"}'"
    expected: "concise"
  - name: "FAQ section exists in team guide"
    command: "grep -ciE '(FAQ|frequently asked|troubleshoot)' docs/aa-ma-team-guide.md"
    expected_pattern: "^[1-9]"
  - name: "Team guide file exists and is non-empty"
    command: "test -s docs/aa-ma-team-guide.md && echo 'ok' || echo 'empty_or_missing'"
    expected: "ok"
